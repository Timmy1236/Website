<!DOCTYPE html>
<html lang="es">

<head>
  <title>Tv Time! - Timmy</title>
  <link rel="icon" href="../favicon.png" />

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      margin: 0;
      background: transparent;
      display: flex;

    }

    .tv-container {
      position: relative;
      width: 300px;
      height: 260px;
    }

    .tv-screen {
      position: absolute;
      top: 13%;
      left: 12%;
      width: 230px;
      height: 200px;
      overflow: hidden;
      border-radius: 10px;
    }

    #image {
      width: 100%;
      height: 100%;
      background-size: cover;
      background-repeat: no-repeat;
      background-color: black;
    }

    .tv-frame {
      width: 100%;
      position: relative;
      z-index: 10;
      pointer-events: none;
    }
  </style>
</head>

<body>
  <div class="tv-container">
    <div class="tv-screen">
      <div id="image"></div>
    </div>

    <img src="../assets/images/others/tv-frame.webp" class="tv-frame" alt="Pixel TV" />
  </div>

  <script>
    const images = [
      "../assets/images/iframe/Jesus-free-ps2.gif",
      "../assets/images/iframe/matematico.webp",
      "../assets/images/iframe/maxwell.webp",
      "../assets/images/iframe/meowl.gif",
      "../assets/images/iframe/jumbo.gif"
    ];

    const static = "../assets/images/iframe/static.gif";

    async function changeBackground() {
      const randomIndex = Math.floor(Math.random() * images.length);
      const randomLink = images[randomIndex];

      document.getElementById('image').style.backgroundImage = "url('" + static + "')";

      await new Promise(resolve => setTimeout(resolve, 1000));

      document.getElementById('image').style.backgroundImage = "url('" + randomLink + "')";
    }

    changeBackground();
    setInterval(changeBackground, 5000);
  </script>
</body>

</html>
